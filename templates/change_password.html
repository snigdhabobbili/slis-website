<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SLIS — Change Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo3.png') }}">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 400px; }
h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
p.sub { font-size: 13px; color: #666; margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
.field input:focus { border-color: #111; }
.btn { width: 100%; padding: 11px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; margin-top: 8px; }
.btn:hover { background: #333; }
.error { background: #fff2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #b91c1c; margin-bottom: 18px; }
.rules { font-size: 12px; color: #888; margin-top: 14px; line-height: 1.8; }
</style>
</head>
<body>
<div class="card">
    <h2>Set new password</h2>
    <p class="sub">Your password has expired or this is your first login.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        <div class="field">
            <label>New Password</label>
            <input type="password" name="new_password" required>
        </div>
        <div class="field">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn">Set Password</button>
    </form>

    <div class="rules">
        Password must have:<br>
        • At least 8 characters<br>
        • Uppercase and lowercase letters<br>
        • At least one number<br>
        • At least one special character (!@#$%^&*)
    </div>
</div>
</body>
</html>
